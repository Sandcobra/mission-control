# ---------------------------------------------------------------------------
# Mission Control - Nginx reverse proxy
# ---------------------------------------------------------------------------
# Routing:
#   /api/*  -> backend:8000   (FastAPI REST + SSE)
#   /ws/*   -> backend:8000   (WebSocket upgrade)
#   /       -> frontend:3000  (Next.js)
# ---------------------------------------------------------------------------

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Timeouts suitable for long-lived SSE / WebSocket connections
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # ---------------------------------------------------------------------------
    # Upstreams
    # ---------------------------------------------------------------------------

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Main server block
    # ---------------------------------------------------------------------------

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------------------------------
        # Health check endpoint served by nginx itself so load balancers can
        # verify that the proxy layer is alive without hitting the application.
        # -----------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------------
        # REST API  ->  backend
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Forward real client information
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep-alive to upstream
            proxy_set_header Connection "";

            # Disable buffering for SSE endpoints under /api/
            proxy_buffering    off;
            proxy_cache        off;
        }

        # -----------------------------------------------------------------------
        # WebSocket connections  ->  backend
        # -----------------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Required WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Forward real client information
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No buffering for streaming connections
            proxy_buffering off;
            proxy_cache     off;

            # Keep WebSocket connections open for extended periods
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # -----------------------------------------------------------------------
        # Static assets served by Next.js (_next/static)
        # Cache aggressively since Next.js uses content-hashed filenames.
        # -----------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";

            proxy_cache_valid  200 1y;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }

        # -----------------------------------------------------------------------
        # Everything else  ->  frontend (Next.js)
        # -----------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for Next.js HMR in development (WebSocket on /_next/webpack-hmr)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_upgrade;

            proxy_buffering off;
        }
    }
}
